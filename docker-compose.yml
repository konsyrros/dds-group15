version: "3"
services:

  gateway:
    image: nginx:1.25-bookworm
    volumes:
      - ./gateway_nginx.conf:/etc/nginx/nginx.conf:ro
    ports:
      - "8000:80"
    depends_on:
      - order-service
      - stock-service
      - payment-service

  order-service:
    build:
      context: .
      dockerfile: order/Dockerfile
    image: order:latest
    environment:
      - GATEWAY_URL=http://gateway:80
      - TX_MODE=SAGA
      - CHECKOUT_PROTOCOL=${CHECKOUT_PROTOCOL:-2pc}
      - REQUEST_TIMEOUT_SECONDS=${REQUEST_TIMEOUT_SECONDS:-15}
      - REDIS_QUEUE_WORKERS=${ORDER_QUEUE_WORKERS:-8}
      - REDIS_QUEUE_RESULT_TIMEOUT_SECONDS=${REDIS_QUEUE_RESULT_TIMEOUT_SECONDS:-120}
    command: gunicorn -b 0.0.0.0:5000 -w 2 --timeout 120 --log-level=info app:app
    env_file:
      - env/order_redis.env
    depends_on:
      - order-db

  order-db:
    image: redis:7.2-bookworm
    command: redis-server --requirepass redis --maxmemory 512mb --appendonly yes --appendfsync everysec
    volumes:
      - order-db-data:/data

  stock-service:
    build: ./stock
    image: stock:latest
    environment:
      - REDIS_QUEUE_WORKERS=${STOCK_QUEUE_WORKERS:-8}
      - REDIS_QUEUE_RESULT_TIMEOUT_SECONDS=${REDIS_QUEUE_RESULT_TIMEOUT_SECONDS:-120}
    command: gunicorn -b 0.0.0.0:5000 -w 2 --timeout 120 --log-level=info app:app
    env_file:
      - env/stock_redis.env
    depends_on:
      - stock-db

  stock-db:
    image: redis:7.2-bookworm
    command: redis-server --requirepass redis --maxmemory 512mb --appendonly yes --appendfsync everysec
    volumes:
      - stock-db-data:/data

  payment-service:
    build: ./payment
    image: user:latest
    environment:
      - REDIS_QUEUE_WORKERS=${PAYMENT_QUEUE_WORKERS:-8}
      - REDIS_QUEUE_RESULT_TIMEOUT_SECONDS=${REDIS_QUEUE_RESULT_TIMEOUT_SECONDS:-120}
    command: gunicorn -b 0.0.0.0:5000 -w 2 --timeout 120 --log-level=info app:app
    env_file:
      - env/payment_redis.env
    depends_on:
      - payment-db

  payment-db:
    image: redis:7.2-bookworm
    command: redis-server --requirepass redis --maxmemory 512mb --appendonly yes --appendfsync everysec
    volumes:
      - payment-db-data:/data

volumes:
  order-db-data:
  stock-db-data:
  payment-db-data:
