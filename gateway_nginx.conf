worker_processes auto;
worker_rlimit_nofile 65535;

events {
    worker_connections 4096;
    multi_accept on;
    use epoll;
}

http {
    upstream order-app {
        server order-service:5000;
        keepalive 32;
        keepalive_timeout 65s;
        keepalive_requests 1000;
    }
    
    upstream payment-app {
        server payment-service:5000;
        keepalive 32;
        keepalive_timeout 65s;
        keepalive_requests 1000;
    }

    upstream stock-app {
        server stock-service:5000;
        keepalive 32;
        keepalive_timeout 65s;
        keepalive_requests 1000;
    }

    server {
        listen 80;
        proxy_connect_timeout 5s;
        proxy_read_timeout 30s;
        proxy_send_timeout 30s;

        proxy_http_version 1.1;
        proxy_set_header Connection "";

        location /orders/ { proxy_pass   http://order-app/; }
        location /payment/ { proxy_pass   http://payment-app/; }
        location /stock/ { proxy_pass   http://stock-app/; }
    }

    access_log  /var/log/nginx/access.log;
}
